window: 42
shift_by: 2

lags_weather: [1, 3, 6]
lags_cases: [2, 4, 6]
rolling_windows: [15, 30, 40, 50]

interaction_lag: 3

humidity_threshold: 85
precip_threshold: 3
temp_threshold: 22
diurnal_threshold: 10

bucket_defs:
  temperature_2m_mean_celsius:
    - [0, 20]
    - [20, 25]
    - [25, 30]
    - [30, 80]

  total_precipitation_sum_mm:
    - [0, 0.05]
    - [0.05, 2]
    - [2, 10]
    - [10, 500]

  relative_humidity_percent:
    - [50, 75]
    - [75, 85]
    - [85, 100]